name: Luna Connect — Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Build Android APK via EAS
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build APK with EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --output ./luna-connect.apk

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: luna-connect-apk
          path: luna-connect.apk
          retention-days: 30

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Luna Connect v${{ github.run_number }}
          body: |
            🌙 **Luna Connect APK**

            Automated build from commit `${{ github.sha }}`.

            **Install:**
            1. Download `luna-connect.apk` below
            2. On Android: Settings → Security → Enable "Install Unknown Apps"
            3. Open the APK and tap Install
          files: luna-connect.apk
          token: ${{ secrets.GITHUB_TOKEN }}
