name: Luna Connect — Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Build Android APK via EAS
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Link project to Expo
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          OWNER=$(eas whoami)
          echo "Logged in as: $OWNER"
          npx expo config --type public 2>/dev/null || true
          eas project:init --force --non-interactive 2>/dev/null || true

      - name: Build APK with EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --json \
            --no-wait > build-result.json
          echo "Build submitted."
          cat build-result.json

      - name: Wait for build and download APK
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          BUILD_ID=$(python3 -c "import json,sys; data=json.load(open('build-result.json')); print(data[0]['id'] if isinstance(data,list) else data['id'])")
          echo "Build ID: $BUILD_ID"
          echo "Waiting for EAS build to finish..."
          while true; do
            RESULT=$(eas build:view $BUILD_ID --json)
            STATUS=$(python3 -c "import json,sys; data=json.loads('''$RESULT'''); print(data.get('status',''))" 2>/dev/null || echo "UNKNOWN")
            echo "Status: $STATUS"
            if [ "$STATUS" = "FINISHED" ]; then
              URL=$(python3 -c "import json,sys; data=json.loads('''$RESULT'''); print(data.get('artifacts',{}).get('buildUrl',''))" 2>/dev/null)
              echo "Downloading APK from: $URL"
              curl -L "$URL" -o luna-connect.apk
              echo "✅ APK downloaded"
              break
            elif [ "$STATUS" = "ERRORED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "❌ Build failed: $STATUS"
              exit 1
            fi
            sleep 30
          done

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: luna-connect-apk
          path: luna-connect.apk
          retention-days: 30

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Luna Connect v${{ github.run_number }}
          body: |
            🌙 **Luna Connect APK**

            Automated build from commit `${{ github.sha }}`.

            **Install:**
            1. Download `luna-connect.apk` below
            2. On Android: Settings → Security → Enable "Install Unknown Apps"
            3. Open the APK and tap Install
          files: luna-connect.apk
          token: ${{ secrets.GITHUB_TOKEN }}
